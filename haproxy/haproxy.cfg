#-----------------------------------------------------------------------
# HAProxy 2.8 — LMS API Gateway
#-----------------------------------------------------------------------
global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect  5s
    timeout client  30s
    timeout server  30s
    retries 3

#-----------------------------------------------------------------------
# Stats dashboard — visit http://localhost:8404/stats in your browser
#-----------------------------------------------------------------------
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends

#-----------------------------------------------------------------------
# Main frontend — listens on port 80
# Routes by URL path prefix to the correct backend
#-----------------------------------------------------------------------
frontend lms_http
    bind *:80

    # Path-based ACLs
    acl is_auth      path_beg /api/auth
    acl is_videos    path_beg /api/videos
    acl is_watchlist path_beg /api/watchlist
    acl is_admin     path_beg /api/admin

    use_backend auth_service      if is_auth
    use_backend video_service     if is_videos
    use_backend watchlist_service if is_watchlist
    use_backend admin_service     if is_admin

    # Everything else goes to the React frontend
    default_backend frontend_app

#-----------------------------------------------------------------------
# Backends — one per microservice
# HAProxy strips the /api/<prefix> so Flask sees /auth/..., /videos/...
#-----------------------------------------------------------------------
backend auth_service
    option httpchk GET /health
    http-request replace-path /api/auth(/?)(.*)  /\2
    server auth auth-service:5001 check

backend video_service
    option httpchk GET /health
    http-request replace-path /api/videos(/?)(.*)  /\2
    server video video-service:5002 check

backend watchlist_service
    option httpchk GET /health
    http-request replace-path /api/watchlist(/?)(.*)  /\2
    server watchlist watchlist-service:5003 check

backend admin_service
    option httpchk GET /health
    http-request replace-path /api/admin(/?)(.*)  /\2
    server admin admin-service:5004 check

backend frontend_app
    server frontend frontend:3000
